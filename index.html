<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lilyholic Chat</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    #chat-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }

    #messages {
      height: 300px;
      overflow-y: auto;
      background: #000;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    .msg {
      margin-bottom: 10px;
      padding: 8px;
      background: #333;
      border-radius: 5px;
    }

    #input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 15px;
      background: #4CAF50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

  <h1>Bienvenidos a mi web</h1>
  <p style="text-align:center;">Aquí está mi chat funcionando con Firebase.</p>

  <div id="chat-container">
    <div id="messages"></div>

    <div id="input-area">
      <input type="text" id="messageInput" placeholder="Escribe un mensaje...">
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

</body>
</html>
