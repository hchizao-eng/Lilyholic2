<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lilyholic Chat</title>

  <!-- Firebase SDK v9+ (modular) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBuruYnDWyG_7CDvs_nyfAD-iOkcaEwCaQ",
      authDomain: "lilyholic.firebaseapp.com",
      databaseURL: "https://lilyholic-default-rtdb.firebaseio.com",
      projectId: "lilyholic",
      storageBucket: "lilyholic.firebasestorage.app",
      messagingSenderId: "68491199560",
      appId: "1:68491199560:web:8dbf2ae48177e44d2f047d",
      measurementId: "G-384DPKGE8F"
    };

    try {
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      console.log("✅ Firebase inicializado correctamente");

      window.sendMessage = function() {
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        if (text === "") return;

        push(ref(db, "messages"), { text, timestamp: new Date().getTime() })
          .then(() => {
            console.log("✅ Mensaje enviado");
            input.value = "";
          })
          .catch(error => console.error("❌ Error al enviar:", error));
      };

      window.addMessageToScreen = function(text) {
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "msg";
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      };

      // Escuchar mensajes nuevos
      onChildAdded(ref(db, "messages"), snapshot => {
        const data = snapshot.val();
        if (data && data.text) {
          window.addMessageToScreen(data.text);
          console.log("💬 Nuevo mensaje:", data.text);
        }
      }, error => {
        console.error("❌ Error al cargar mensajes:", error);
      });

    } catch (error) {
      console.error("❌ Error inicializando Firebase:", error);
    }
  </script>

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    #chat-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }

    #messages {
      height: 300px;
      overflow-y: auto;
      background: #000;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    .msg {
      margin-bottom: 10px;
      padding: 8px;
      background: #333;
      border-radius: 5px;
      word-wrap: break-word;
    }

    #input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      background: #4CAF50;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #45a049;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

  <h1>Bienvenidos a mi web</h1>
  <p style="text-align:center;">Aquí está mi chat funcionando con Firebase.</p>

  <div id="chat-container">
    <div id="messages"></div>

    <div id="input-area">
      <input type="text" id="messageInput" placeholder="Escribe un mensaje..." autocomplete="off">
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

</body>
</html>
